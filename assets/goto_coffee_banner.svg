<svg viewBox="0 0 600 220" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <clipPath id="bn-bean" clipPathUnits="userSpaceOnUse">
          <circle cx="460" cy="108" r="72" transform="rotate(12 460 108)"/>
        </clipPath>
      </defs>

      <rect width="600" height="220" fill="#fdf6e8"/>

      <!-- roaster: +12deg around (450, 110) -->
      <g transform="rotate(12 460 110)">

        <!-- FRAME bars -->
        <rect x="330" y="22"  width="230" height="10" rx="3" fill="#c8a848" opacity="0.26"/>
        <rect x="330" y="188" width="230" height="10" rx="3" fill="#c8a848" opacity="0.26"/>
        <rect x="330" y="22"  width="10" height="176" rx="3" fill="#c8a848" opacity="0.26"/>
        <rect x="562" y="22"  width="10" height="176" rx="3" fill="#c8a848" opacity="0.26"/>
        <!-- corner brackets -->
        <rect x="327" y="19" width="16" height="16" rx="2" fill="#b09038" opacity="0.34"/>
        <rect x="559" y="19" width="16" height="16" rx="2" fill="#b09038" opacity="0.34"/>
        <rect x="327" y="183" width="16" height="16" rx="2" fill="#b09038" opacity="0.34"/>
        <rect x="559" y="183" width="16" height="16" rx="2" fill="#b09038" opacity="0.34"/>

        <!-- DRUM -->
        <circle cx="460" cy="108" r="68" fill="#e8c86a" opacity="0.18"/>
        <circle cx="460" cy="108" r="68" fill="#b09038" opacity="0.12"/>
        <circle cx="460" cy="108" r="58" fill="#fdf6e8" opacity="0.65"/>
        <!-- 3 cage slats -->
        <rect x="396" y="72"  width="128" height="7" rx="3" fill="#c8a040" opacity="0.20"/>
        <rect x="392" y="104" width="136" height="7" rx="3" fill="#c8a040" opacity="0.20"/>
        <rect x="396" y="136" width="128" height="7" rx="3" fill="#c8a040" opacity="0.20"/>
        <!-- axle -->
        <rect x="308" y="104" width="284" height="6" rx="3" fill="#b09038" opacity="0.16"/>

        <!-- right handle only -->
        <rect x="566" y="94"  width="32" height="28" rx="14" fill="#d4904a" opacity="0.55"/>
        <rect x="568" y="99"  width="28" height="18" rx="9"  fill="#e8b06a" opacity="0.30"/>

      </g>

      <!-- BEANS inside drum -->
      <g clip-path="url(#bn-bean)">
        <g transform="translate(420,116) rotate(-20)">
          <ellipse cx="0" cy="0" rx="15" ry="21" fill="#8c4e10"/>
          <path d="M0 -18 Q6 0 0 18" stroke="#e8c86a" stroke-width="2" fill="none" stroke-linecap="round"/>
        </g>
        <g transform="translate(460,100) rotate(8)">
          <ellipse cx="0" cy="0" rx="15" ry="21" fill="#b06018"/>
          <path d="M0 -18 Q6 0 0 18" stroke="#e8c86a" stroke-width="2" fill="none" stroke-linecap="round"/>
        </g>
        <g transform="translate(500,118) rotate(22)">
          <ellipse cx="0" cy="0" rx="15" ry="21" fill="#6e3808"/>
          <path d="M0 -18 Q6 0 0 18" stroke="#e8c86a" stroke-width="2" fill="none" stroke-linecap="round"/>
        </g>
      </g>

      <!-- TEXT — stays left of x=300, roaster starts at x≈320 -->
      <text x="52" y="80"
        font-family="'Fraunces',Georgia,serif"
        font-size="26" font-weight="900" letter-spacing="3"
        fill="#7a4810">GOTO COFFEE</text>

      <text x="44" y="142"
        font-family="'Fraunces',Georgia,serif"
        font-size="52" font-weight="700" letter-spacing="-0.5"
        fill="#b06018">ShakaShaka</text>

      <line x1="52" y1="154" x2="270" y2="160" stroke="#e0b870" stroke-width="0.7"/>

      <text x="52" y="172"
        font-family="'Fraunces',Georgia,serif"
        font-size="11" letter-spacing="3"
        fill="#a07030">Roast Management App</text>

      <rect x="1" y="1" width="598" height="218" rx="13" fill="none" stroke="#e8c880" stroke-width="1"/>
    </svg>