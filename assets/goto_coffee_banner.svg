<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="bn-bean" clipPathUnits="userSpaceOnUse">
      <circle cx="1000" cy="150" r="105" transform="rotate(10 1000 150)"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="1200" height="300" fill="#fdf4e0"/>

  <!-- roaster: +10deg, right side, large -->
  <g transform="rotate(10 1000 150)">

    <!-- FRAME bars — dark, visible -->
    <rect x="850" y="24"  width="330" height="11" rx="3" fill="#6a4c08" opacity="0.80"/>
    <rect x="850" y="275" width="330" height="11" rx="3" fill="#6a4c08" opacity="0.80"/>
    <rect x="850" y="24"  width="11" height="262" rx="3" fill="#6a4c08" opacity="0.80"/>
    <rect x="1169" y="24"  width="11" height="262" rx="3" fill="#6a4c08" opacity="0.80"/>
    <!-- corner brackets -->
    <rect x="845" y="19"  width="20" height="20" rx="3" fill="#4a3406" opacity="0.88"/>
    <rect x="1165" y="19"  width="20" height="20" rx="3" fill="#4a3406" opacity="0.88"/>
    <rect x="845" y="271" width="20" height="20" rx="3" fill="#4a3406" opacity="0.88"/>
    <rect x="1165" y="271" width="20" height="20" rx="3" fill="#4a3406" opacity="0.88"/>

    <!-- DRUM ring -->
    <circle cx="1000" cy="150" r="108" fill="none" stroke="#6a4c08" stroke-width="5" opacity="0.70"/>

    <!-- cage slats -->
    <rect x="888" y="110" width="224" height="7" rx="3" fill="#6a4c08" opacity="0.50"/>
    <rect x="882" y="147" width="236" height="7" rx="3" fill="#6a4c08" opacity="0.50"/>
    <rect x="888" y="184" width="224" height="7" rx="3" fill="#6a4c08" opacity="0.50"/>

    <!-- axle -->
    <rect x="800" y="147" width="370" height="7" rx="3" fill="#6a4c08" opacity="0.28"/>

    <!-- right handle -->
    <rect x="1150" y="138" width="42" height="24" rx="12" fill="#b86028" opacity="0.82"/>

  </g>

  <!-- drum interior warm fill -->
  <circle cx="1000" cy="150" r="102" fill="#e8906a" opacity="0.18" transform="rotate(10 1000 150)"/>

  <!-- BEANS inside drum — large, spread wide -->
  <g clip-path="url(#bn-bean)">
    <!-- bean left -->
    <g transform="translate(944,162) rotate(-22)">
      <ellipse cx="0" cy="0" rx="18" ry="26" fill="#7a3a08"/>
      <path d="M0 -23 Q9 0 0 23" stroke="#fce8a8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>
    <!-- bean centre -->
    <g transform="translate(1000,132) rotate(6)">
      <ellipse cx="0" cy="0" rx="18" ry="26" fill="#a85010"/>
      <path d="M0 -23 Q9 0 0 23" stroke="#fce8a8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>
    <!-- bean right -->
    <g transform="translate(1056,166) rotate(26)">
      <ellipse cx="0" cy="0" rx="18" ry="26" fill="#6e3208"/>
      <path d="M0 -23 Q9 0 0 23" stroke="#fce8a8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- TEXT — left side, generous space -->
  <!-- GOTO COFFEE -->
  <text x="52" y="108"
    font-family="Poppins,sans-serif"
    font-size="68" font-weight="700" letter-spacing="4"
    fill="#3a1e04">GOTO COFFEE</text>

  <!-- ShakaShaka -->
  <text x="42" y="228"
    font-family="Poppins,sans-serif"
    font-size="118" font-weight="700" letter-spacing="-1"
    fill="#b04010">ShakaShaka</text>

  <!-- sub -->
  <line x1="52" y1="248" x2="520" y2="248" stroke="#c8a040" stroke-width="0.8"/>
  <text x="52" y="272"
    font-family="Poppins,sans-serif"
    font-size="24" letter-spacing="4" font-weight="400"
    fill="#a07030">Roast Management App</text>

  <!-- outer border -->
  <rect x="2" y="2" width="1196" height="296" rx="16" fill="none" stroke="#e8c880" stroke-width="2"/>
</svg>
