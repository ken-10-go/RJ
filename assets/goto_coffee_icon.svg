<svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
      <rect width="160" height="160" rx="36" fill="#faf8f5"/>
      <defs>
        <!-- bean clip = drum circle in rotated space -->
        <clipPath id="ic-bean" clipPathUnits="userSpaceOnUse">
          <circle cx="82" cy="51" r="30" transform="rotate(10 82 51)"/>
        </clipPath>
        <!-- drum fill clip (same circle) -->
        <clipPath id="ic-drum" clipPathUnits="userSpaceOnUse">
          <circle cx="82" cy="51" r="30" transform="rotate(10 82 51)"/>
        </clipPath>
      </defs>

      <!-- whole roaster: +10deg -->
      <g transform="rotate(10 82 51)">

        <!-- FRAME: 4 bars as flat color rectangles, no stroke -->
        <!-- top bar -->
        <rect x="26" y="17" width="108" height="7" rx="2" fill="#c8a848" opacity="0.28"/>
        <!-- bottom bar -->
        <rect x="26" y="82" width="108" height="7" rx="2" fill="#c8a848" opacity="0.28"/>
        <!-- left upright -->
        <rect x="26" y="17" width="7" height="72" rx="2" fill="#c8a848" opacity="0.28"/>
        <!-- right upright -->
        <rect x="127" y="17" width="7" height="72" rx="2" fill="#c8a848" opacity="0.28"/>
        <!-- corner squares (slightly darker) -->
        <rect x="24" y="15" width="11" height="11" rx="1.5" fill="#b09038" opacity="0.36"/>
        <rect x="125" y="15" width="11" height="11" rx="1.5" fill="#b09038" opacity="0.36"/>
        <rect x="24" y="80" width="11" height="11" rx="1.5" fill="#b09038" opacity="0.36"/>
        <rect x="125" y="80" width="11" height="11" rx="1.5" fill="#b09038" opacity="0.36"/>

        <!-- DRUM FILL: circle, lighter tone -->
        <circle cx="82" cy="51" r="26" fill="#e8c86a" opacity="0.20"/>
        <!-- drum ring: slightly darker annulus via two circles -->
        <circle cx="82" cy="51" r="26" fill="#b09038" opacity="0.14"/>
        <circle cx="82" cy="51" r="22" fill="#fff8ee" opacity="0.55"/>
        <!-- 3 cage slats: flat color rects, no stroke -->
        <rect x="60" y="37" width="44" height="4" rx="2" fill="#c8a040" opacity="0.22"/>
        <rect x="57" y="49" width="50" height="4" rx="2" fill="#c8a040" opacity="0.22"/>
        <rect x="60" y="61" width="44" height="4" rx="2" fill="#c8a040" opacity="0.22"/>

        <!-- axle: thin flat rect (no stroke) -->
        <rect x="4"  y="49" width="148" height="4" rx="2" fill="#b09038" opacity="0.18"/>

        <!-- right handle only: two tone rects -->
        <rect x="134" y="44" width="22" height="14" rx="7" fill="#d4904a" opacity="0.55"/>
        <rect x="136" y="47" width="18" height="8"  rx="4" fill="#e8b06a" opacity="0.35"/>

      </g>

      <!-- BEANS inside drum -->
      <g clip-path="url(#ic-bean)">
        <g transform="translate(66,56) rotate(-18)">
          <ellipse cx="0" cy="0" rx="8" ry="12" fill="#8c4e10"/>
          <path d="M0 -10 Q4 0 0 10" stroke="#e8c86a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </g>
        <g transform="translate(82,46) rotate(8)">
          <ellipse cx="0" cy="0" rx="8" ry="12" fill="#b06018"/>
          <path d="M0 -10 Q4 0 0 10" stroke="#e8c86a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </g>
        <g transform="translate(98,57) rotate(24)">
          <ellipse cx="0" cy="0" rx="8" ry="12" fill="#6e3808"/>
          <path d="M0 -10 Q4 0 0 10" stroke="#e8c86a" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        </g>
      </g>

      <!-- TEXT — starts at y=104, well below drum (max ~92 after tilt) -->
      <line x1="24" y1="104" x2="136" y2="104" stroke="#e0b870" stroke-width="0.6"/>
      <text x="80" y="119" text-anchor="middle"
        font-family="'Fraunces',Georgia,serif"
        font-size="11" font-weight="900" letter-spacing="2"
        fill="#7a4810">GOTO COFFEE</text>
      <text x="80" y="140" text-anchor="middle"
        font-family="'Fraunces',Georgia,serif"
        font-size="14" font-weight="700" letter-spacing="1"
        fill="#b06018">ShakaShaka</text>

    </svg>